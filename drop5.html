<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee;
    display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;

  #player-id { font-size: 0.8rem; color: #666; margin-bottom: 10px; letter-spacing: 1px; }
  #score-area { margin-bottom: 14px; font-size: 1.1rem; color: #ccc; }
  #score-area span { color: #f0c040; font-weight: bold; font-size: 1.3rem; }
  #queue-area { display: flex; gap: 10px; margin-bottom: 16px; align-items: flex-end; }
  .queue-label { font-size: 0.75rem; color: #888; margin-bottom: 4px; text-align: center; }

  .col-btn:hover:not(.selected) { background: #3a3a6a; color: #888; }
  #grid {
    display: grid; grid-template-columns: repeat(5, 62px); grid-template-rows: repeat(5, 62px);
    gap: 4px; background: #111; padding: 6px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .cell {
    width: 62px; height: 62px; border-radius: 8px; background: #222;

  #drop-btn {
    margin-top: 14px; padding: 12px 40px; border-radius: 10px; border: none;
    background: #f0c040; color: #1a1a2e; font-size: 1.1rem; font-weight: bold; cursor: pointer; display: none;
  }
  #pc-hint { margin-top: 12px; font-size: 0.8rem; color: #666; text-align: center; line-height: 1.6; }
  #ranking-area { margin-top: 24px; width: 100%; max-width: 320px; }
  #ranking-area h3 { color: #f0c040; font-size: 1rem; margin-bottom: 10px; text-align: center; }
  .rank-row {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    border-radius: 8px; background: #222; margin-bottom: 4px; font-size: 0.9rem;
  }
  .rank-row.me { background: #2a2a4a; border: 1px solid #f0c040; }
  .rank-num { width: 24px; color: #888; text-align: center; font-size: 0.8rem; }
  .rank-id { flex: 1; color: #ccc; font-family: monospace; }
  .rank-score { color: #f0c040; font-weight: bold; }
  #start-screen {
    position: fixed; inset: 0; background: #1a1a2e; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px; z-index: 200; padding: 20px;
  }
  #start-screen h1 { font-size: 2.8rem; }
  #start-screen .subtitle { color: #888; font-size: 0.95rem; }
  .start-btn {
    width: 240px; padding: 14px; border-radius: 12px; border: none; background: #f0c040;
    color: #1a1a2e; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.2s;
  }
  .start-btn:hover { background: #ffd060; transform: translateY(-2px); }
  #overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    align-items: center; justify-content: center; flex-direction: column; gap: 16px; z-index: 100;
  }
  #overlay.show { display: flex; }
  #overlay h2 { font-size: 2.5rem; color: #f0c040; }
  #overlay p { font-size: 1.2rem; color: #ccc; }
  #restart-btn {
    padding: 12px 36px; border-radius: 10px; border: none; background: #f0c040;
    color: #1a1a2e; font-size: 1.1rem; font-weight: bold; cursor: pointer;
  }
  footer { text-align: center; color: #d1cbcb; font-size: 0.8rem; margin-top: 30px; }
  @keyframes merge-pop { 0%{transform:scale(1);} 50%{transform:scale(1.3);} 100%{transform:scale(1);} }
  .merge-anim { animation: merge-pop 0.2s ease; }

<body>

<div id="start-screen">
  <button class="back-button" onclick="location.href='index.html'">←</button>
  <h1>NumDrops</h1>
  <div style="font-size:2rem;">5×5</div>
  <p class="subtitle">Drop & Merge Number Puzzle</p>
  <button class="start-btn" onclick="startGame()">Start</button>

<button class="back-button" onclick="location.href='index.html'">←</button>
<h1>💧 NumDrops</h1>
<div class="version-badge">5×5</div>
<div id="player-id"></div>
<div id="score-area">Score: <span id="score">0</span></div>

<div id="queue-area">
  <div class="queue-slot"><div class="queue-label">Next</div><div class="queue-card active" id="q0"></div></div>
  <div class="queue-slot"><div class="queue-label"></div><div class="queue-card" id="q1"></div></div>
  <div class="queue-slot"><div class="queue-label"></div><div class="queue-card" id="q2"></div></div>
</div>

<div id="col-buttons"></div>

  <h3>🏆 Top 10 · 5×5</h3>
  <div id="ranking-list"></div>
</div>

<div id="overlay">
  <h2>Game Over</h2>
  <p>Score: <strong id="final-score"></strong></p>
  <p id="rank-result" style="font-size:0.95rem;color:#aaa;"></p>
  <button id="restart-btn">Play Again</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, orderBy, limit, getDocs }
  from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8l7X_Kxfsu-qMxAj74ENiPTJzCatk0Z4",
  authDomain: "numdrops-fe679.firebaseapp.com",
  projectId: "numdrops-fe679",
  storageBucket: "numdrops-fe679.firebasestorage.app",
  messagingSenderId: "524797542203",
  appId: "1:524797542203:web:e123c9f67735c06f5bc11e",
  measurementId: "G-G4LBFHLW5H"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ROWS = 5, COLS = 5;
const CARDS = [2, 4, 8];
const MODE = '5x5';
const QUEUE_SIZE = 3;
const CONSONANTS = 'BCDFGHJKLMNPQRSTVWXZ';
const DIGITS = '23456789';

const COLOR_MAP = {
  2:{bg:'#a8e063',fg:'#2a5a00'}, 4:{bg:'#56ab2f',fg:'#fff'}, 8:{bg:'#0abdc6',fg:'#fff'},
  16:{bg:'#007ec6',fg:'#fff'}, 32:{bg:'#9b59b6',fg:'#fff'}, 64:{bg:'#e91e8c',fg:'#fff'},
  128:{bg:'#f39c12',fg:'#fff'}, 256:{bg:'#e74c3c',fg:'#fff'}, 512:{bg:'#c0392b',fg:'#fff'},
  1024:{bg:'#bdc3c7',fg:'#2c3e50'}, 2048:{bg:'#f0f0f0',fg:'#e67e22'},
};
function getColor(v) { return COLOR_MAP[v] || {bg:'#f0c040',fg:'#1a1a2e'}; }

function genId() {
  const c = () => CONSONANTS[Math.floor(Math.random()*CONSONANTS.length)];
  const d = () => DIGITS[Math.floor(Math.random()*DIGITS.length)];
  return c()+c()+d()+d()+c()+c();
}

let playerId = localStorage.getItem('numdrops-id');
if (!playerId) { playerId = genId(); localStorage.setItem('numdrops-id', playerId); }
document.getElementById('player-id').textContent = playerId;

let board, queue, selectedCol, score, gameOver, isMobile;

function startGame() { document.getElementById('start-screen').style.display='none'; init(); }
window.startGame = startGame;

function init() {
  score=0; gameOver=false; selectedCol=0;
  document.getElementById('score').textContent='0';
  document.getElementById('overlay').classList.remove('show');
  board=Array.from({length:ROWS},()=>Array.from({length:COLS},()=>({value:0})));
  queue=Array.from({length:QUEUE_SIZE+10},randomCard);
  isMobile=window.innerWidth<=640||'ontouchstart' in window;
  document.getElementById('drop-btn').style.display=isMobile?'block':'none';
  document.getElementById('pc-hint').style.display=isMobile?'none':'block';
  buildGrid(); buildColButtons(); updateQueueUI(); renderBoard(); highlightCol();
  loadRanking();
}

function randomCard() {
  const weights=[50,35,15];
  const total=weights.slice(0,CARDS.length).reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<CARDS.length;i++){r-=weights[i];if(r<=0)return CARDS[i];}
  return CARDS[0];
}

function buildGrid() {
  const grid=document.getElementById('grid'); grid.innerHTML='';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const cell=document.createElement('div');
    cell.className='cell'; cell.id=`cell-${r}-${c}`; grid.appendChild(cell);
  }
}

function buildColButtons() {
  const container=document.getElementById('col-buttons'); container.innerHTML='';
  for(let c=0;c<COLS;c++){
    const btn=document.createElement('button');
    btn.className='col-btn'+(c===selectedCol?' selected':'');
    btn.textContent='▼';
    btn.addEventListener('click',()=>{selectedCol=c;highlightCol();if(isMobile)return;dropCard();});
    container.appendChild(btn);
  }
}

function highlightCol() {
  document.querySelectorAll('.col-btn').forEach((btn,i)=>btn.classList.toggle('selected',i===selectedCol));
}

function renderBoard(mergeSet) {
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const el=document.getElementById(`cell-${r}-${c}`);
    const d=board[r][c];
    el.classList.remove('merge-anim'); void el.offsetWidth;
    if(mergeSet&&mergeSet.has(`${r}-${c}`)) el.classList.add('merge-anim');
    if(d.value>0){
      const col=getColor(d.value);
      el.style.background=col.bg; el.style.color=col.fg;
      el.style.border='none'; el.textContent=d.value; el.style.fontSize=fontSize(d.value);
    } else {
      el.style.background='#222'; el.style.color='#555';
      el.style.border='none'; el.textContent=''; el.style.fontSize='1.2rem';
    }
  }
}

function fontSize(v){if(v>=1000)return'0.9rem';if(v>=100)return'1rem';return'1.2rem';}

function updateQueueUI(){
  for(let i=0;i<QUEUE_SIZE;i++){
    const el=document.getElementById(`q${i}`);if(!el)continue;
    el.textContent=queue[i]??'';
    el.style.background=i===0?'#555':'#333';
    el.style.color=i===0?'#eee':'#777';
    el.className='queue-card'+(i===0?' active':'');
  }
}

function dropCard(){
  if(gameOver)return;
  const col=selectedCol,cardVal=queue[0];
  let targetRow=-1;
  for(let r=ROWS-1;r>=0;r--){if(board[r][col].value===0){targetRow=r;break;}}
  if(targetRow===-1){checkGameOver();return;}
  board[targetRow][col]={value:cardVal};
  queue.shift();queue.push(randomCard());updateQueueUI();
  const mergeSet=new Set();
  runMergeLoop(targetRow,col,mergeSet);
  renderBoard(mergeSet);
  checkGameOver();
}

function runMergeLoop(newR,newC,mergeSet){
  let q=[{r:newR,c:newC}];
  while(q.length>0){
    const next=[];
    for(const{r,c}of q){
      if(board[r][c].value===0)continue;
      const val=board[r][c].value;
      const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
      for(const[dr,dc]of dirs){
        const nr=r+dr,nc=c+dc;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
        if(board[nr][nc].value===val){
          const newVal=val*2;
          score+=newVal;
          document.getElementById('score').textContent=score;
          board[nr][nc]={value:newVal};board[r][c]={value:0};
          mergeSet.add(`${nr}-${nc}`);next.push({r:nr,c:nc});
          if(newVal===256)fireConfetti();
          break;
        }
      }
    }
    applyGravityAll();
    if(next.length===0){
      const seen=new Set();
      for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
        const cur=board[r][c];if(cur.value===0)continue;
        const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
        for(const[dr,dc]of dirs){
          const nr=r+dr,nc=c+dc;
          if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
          if(board[nr][nc].value===cur.value){
            const key=`${r}-${c}`;
            if(!seen.has(key)){next.push({r,c});seen.add(key);seen.add(`${nr}-${nc}`);}
            break;
          }
        }
      }
    }
    q=next;
  }
}

function applyGravityAll(){for(let c=0;c<COLS;c++)compactDown(c);}

function compactDown(c){
  let writeRow=ROWS-1;
  for(let r=ROWS-1;r>=0;r--){
    if(board[r][c].value>0){
      if(r!==writeRow){board[writeRow][c]={...board[r][c]};board[r][c]={value:0};}
      writeRow--;
    }
  }
  for(let r=writeRow;r>=0;r--)board[r][c]={value:0};
}

async function checkGameOver(){
  for(let c=0;c<COLS;c++){if(board[0][c].value===0)return;}
  gameOver=true;
  document.getElementById('final-score').textContent=score;
  await saveScore();
  await loadRanking();
  document.getElementById('overlay').classList.add('show');
}

async function saveScore(){
  try{
    await addDoc(collection(db,'scores'),{id:playerId,mode:MODE,score:score,ts:Date.now()});
  }catch(e){console.error(e);}
}

async function loadRanking(){
  try{
    const q=query(collection(db,'scores'),where('mode','==',MODE),orderBy('score','desc'),limit(10));
    const snap=await getDocs(q);
    const list=document.getElementById('ranking-list');
    list.innerHTML='';
    let rank=1,myRank=null;
    snap.forEach(doc=>{
      const d=doc.data();
      const isMe=d.id===playerId&&d.score===score;
      if(isMe)myRank=rank;
      const row=document.createElement('div');
      row.className='rank-row'+(isMe?' me':'');
      row.innerHTML=`<span class="rank-num">${rank}</span><span class="rank-id">${d.id}</span><span class="rank-score">${d.score.toLocaleString()}</span>`;
      list.appendChild(row);
      rank++;
    });
    if(myRank)document.getElementById('rank-result').textContent=`Your rank: #${myRank}`;
  }catch(e){console.error(e);}
}

document.addEventListener('keydown',e=>{
  if(gameOver)return;
  if(e.key==='ArrowLeft'){e.preventDefault();selectedCol=Math.max(0,selectedCol-1);highlightCol();}
  if(e.key==='ArrowRight'){e.preventDefault();selectedCol=Math.min(COLS-1,selectedCol+1);highlightCol();}
  if(e.key==='Enter'||e.key===' '){e.preventDefault();dropCard();}
});

document.getElementById('drop-btn').addEventListener('click',dropCard);
document.getElementById('restart-btn').addEventListener('click',init);

function fireConfetti(){
  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;pointer-events:none;';
  document.body.appendChild(canvas);
  const myConfetti=confetti.create(canvas,{resize:true});
  myConfetti({particleCount:80,angle:60,spread:70,origin:{x:0,y:0.7}});
  myConfetti({particleCount:80,angle:120,spread:70,origin:{x:1,y:0.7}});
  setTimeout(()=>canvas.remove(),4000);
}
</script>
</body>
</html>
